<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Teiwiet</title>
  <link rel="stylesheet" href="https://unpkg.com/98.css" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div></div>
  <div id="desktop">
    <div class="icon" id="aboutIcon">
      <img src="/pictures/msagent-2.png" alt="About me">
      <span><a href="#">About me</a></a></span>
    </div>
    <div class="icon" id="musicDesktopIcon">
      <img src="/pictures/directory_open_file_mydocs-1.png">
      <span><a href="#" onclick="return false;">Music</a></span>
    </div>
    <div class="icon">
      <img src="/pictures/help_book_computer-0.png" alt="Project 3">
      <span><a href="https://github.com/yourname/project3" target="_blank">WriteUp</a></span>
    </div>
  </div>

  <!-- Media Player -->
  <div class="window" id="musicWindow" style="display:none; min-width:360px; width:480px;">
    <!-- Thanh tiêu đề chính -->
    <div class="title-bar" id="musicWindowHeader">
      <div class="title-bar-text">Media Player</div>
      <div class="title-bar-controls">
        <button aria-label="Minimize" id="minMusic"></button>
        <button aria-label="Maximize" id="maxMusic"></button>
        <button aria-label="Close" id="closeMusic"></button>
      </div>
    </div>

    <div class="window-body" style="padding:0; margin:0;">
      <div class="title-bar">
        <div class="title-bar-text" id="nowPlayingText">Now Playing</div>
      </div>

      <!-- Video player -->
      <div class="video-wrapper">
        <video id="videoPlayer" controls preload="auto"></video>
      </div>

      <!-- Nút điều khiển -->
      <div class="video-controls">
        <button id="prevBtn">⏮</button>
        <button id="playBtn">▶</button>
        <button id="pauseBtn">⏸</button>
        <button id="nextBtn">⏭</button>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
      </div>
    </div>
  </div>

  <!-- CV -->
  <div class="window" id="cvWindow" style="display:none; width:1000px; height:800px;">
    <div class="title-bar" id="cvWindowHeader">
      <div class="title-bar-text">Viet Tran - CV</div>
      <div class="title-bar-controls">
        <button aria-label="Close" id="closeCV"></button>
      </div>
    </div>
    <div class="window-body" style="padding:0; height:100%;">
      <iframe src="#" style="width:100%; height:100%; border:none;">
      </iframe>
    </div>

  </div>

  <!-- Duck -->
  <div id="duck"></div>
  <!-- Taskbar -->
  <div id="taskbar">
    <button class="start-button">Start</button>
    <div class="taskbar-items" id="taskbarItems">
    </div>
    <div class="taskbar-clock" id="clock"></div>
  </div>

  <script src="/drag.js"></script>
  <script src="/duck.js"></script>
  <script src="/music.js"></script>
  <script src="/about.js"></script>
  <script src="/clock.js"></script>
</body>

</html>
